{ bengali: ['নিরাপদে'], english: ['Safe and sound', 'Safe and secure'], quizQuestion: 'শিশুটি নিরাপদে ফিরে এসেছে।', quizAnswers: ["The child returned safe and sound", "The child has returned safe and sound", "The child came back safe and sound", "The child returned safe and secure"] },

{ bengali: ['ছোট ছোট অংশ'], english: ['Bits and pieces', 'Odds and ends'], quizQuestion: 'আমি একটা পুরনো চিঠির ছোট ছোট অংশ খুঁজে পেলাম।', quizAnswers: ["I found the bits and pieces of an old letter", "I came across the bits and pieces of an old letter", "I discovered bits and pieces of old letters", "I managed to find bits and pieces of old letters"] },

{ bengali: ['কোলাহল'], english: ['Hustle and bustle', 'Hubbub'], quizQuestion: 'আমি শহরের কোলাহলটা মিস করি।', quizAnswers: ["I miss the hustle and bustle of the city", "I miss the city's hustle and bustle", "I miss the hubbub of the city", "I miss the hustle and bustle of city life"] },

{ bengali: ['সংক্ষিপ্ত কিন্তু সুন্দর'], english: ['Short and sweet', 'Brief and beautiful'], quizQuestion: 'তার বক্তৃতা সংক্ষিপ্ত কিন্তু সুন্দর ছিল।', quizAnswers: ["Her speech was short and sweet", "Her speech was brief and beautiful", "The speech she gave was short and sweet", "Her address was short and sweet"] },

    const state = {

    // ---------- UTILS ----------
    function escapeHTML(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

        return variants.map(v => '• ' + escapeHTML(v)).join('<br>');
    }

    function startTimer() {
        stopTimer();
        state.timerSeconds = 0;
        state.isTimerPaused = false;
        updateTimerDisplay();
        state.timerIntervalId = setInterval(() => {
            if (!state.isTimerPaused) { state.timerSeconds++; updateTimerDisplay(); }
        }, 1000);
    }
    function stopTimer() { if (state.timerIntervalId) { clearInterval(state.timerIntervalId); state.timerIntervalId = null; } }
    function pauseTimer() { state.isTimerPaused = true; }
    function resumeTimer() { state.isTimerPaused = false; }
    function updateTimerDisplay() {
        const m = Math.floor(state.timerSeconds / 60), s = state.timerSeconds % 60;
        headerTimer.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    function updateHeaderPlayerName() { headerPlayerName.textContent = state.playerName; }

function expandBrackets(str) {
  const bracketRegex = /\[([^\]]+)\]/g;
  const matches = [...str.matchAll(bracketRegex)];
  if (matches.length === 0) return [str.trim()];

  const groups = matches.map(m => m[1].split('/').map(s => s.trim()));
  function cartesian(arrays) {
    return arrays.reduce((acc, curr) =>
      acc.flatMap(a => curr.map(c => [...a, c])),
      [[]]
    );
  }
  const combinations = cartesian(groups);
  return combinations.map(comb => {
    let i = 0;
    return str.replace(bracketRegex, () => comb[i++]);
  }).map(s => s.trim());
}


    
    // ---------- DATA LOADING ----------
function parseCSV(txt) {
  const rows = [];
  const lines = txt.trim().split(/\r?\n/);
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && i + 1 < line.length && line[i + 1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    cols.push(cur.trim());
    if (cols.length >= 4) {
      const bengali = cols[0].split(';').map(s => s.trim()).filter(Boolean);
      const english = cols[1].split(';').map(s => s.trim()).filter(Boolean);
      const quizQuestion = cols[2].trim();

      // ✅ Fix: first split by ";" then expand each part with bracket expander
      // Split the cell by ";" → each part is a different meaning
const rawAnswers = cols[3].split(';').map(s => s.trim()).filter(Boolean);
// Expand each meaning’s brackets, preserving the group
const quizAnswers = rawAnswers.map(ans => expandBrackets(ans));

rows.push({
  bengali: bengali.length ? bengali : [cols[0]],
  english: english.length ? english : [cols[1]],
  quizQuestion: quizQuestion || '',
  quizAnswers: quizAnswers.length ? quizAnswers : [[cols[3]]]   // always an array of arrays
});
    }
  }
  return rows;
}


    
    async function loadProverbData() {
        if (CONFIG.googleSheetCSVUrl && CONFIG.googleSheetCSVUrl.trim() !== '') {
            try {
                console.log('📡 Fetching Google Sheet…');
                const res = await fetch(CONFIG.googleSheetCSVUrl);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const csv = await res.text();
                const parsed = parseCSV(csv);
                if (parsed.length > 0) {
                    const firstCell = parsed[0].bengali?.[0]?.toLowerCase();
                    if (firstCell === 'bengali' || firstCell === 'bengali expression') {
                        parsed.shift();
                        console.log('Header row removed');
                    }
                }
                if (parsed.length >= CONFIG.cardsPerSession) {
                    state.allProverbs = parsed;
                    state.remainingPool = [...parsed];
                    console.log(`✅ Loaded ${parsed.length} idioms from sheet`);
                    return;
                }
            } catch (e) {
                console.warn('Google Sheet fetch failed, using fallback:', e.message);
            }
        }
        // Fallback
        state.allProverbs = CONFIG.fallbackData.map(item => ({
            bengali: [...item.bengali],
            english: [...item.english],
            quizQuestion: item.quizQuestion,
            quizAnswers: [...item.quizAnswers]
        }));
        state.remainingPool = [...state.allProverbs];
    }

    // ---------- SESSION POOL ----------
    function selectSessionProverbs() {
        if (state.remainingPool.length < CONFIG.cardsPerSession) {
            state.remainingPool = [...state.allProverbs];
        }
        const shuffled = [...state.remainingPool];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        state.sessionProverbs = shuffled.slice(0, CONFIG.cardsPerSession);
        state.remainingPool = shuffled.slice(CONFIG.cardsPerSession);
        state.currentCardIndex = 0;
        state.isFlipped = false;
        state.score = 0;
        state.currentQuizIndex = 0;
        state.quizOrder = [];
        state.timerSeconds = 0;
        updateTimerDisplay();
        updateHeaderScore();
        updateHeaderCardIndex();
    }

    // ---------- RENDER: HUB ----------
    function renderHub() {
        state.phase = 'hub';
        stopTimer();
        state.timerSeconds = 0;
        updateTimerDisplay();
        updateHeaderScore();
        updateHeaderCardIndex();
        headerCardIndex.textContent = `--/${state.totalInSession}`;
        headerScoreItem.classList.add('muted');
        headerScore.textContent = `--/${state.totalInSession}`;

        mainContent.innerHTML = `
            <div class="idiom-hub">
                <div><div class="idiom-title">Idio<span class="accent">Mize</span></div><div class="idiom-subtitle">Bengali → English Idiomatic Expressions</div></div>
                <div class="idiom-input-group"><label for="playerNameInput">Player Name</label><input type="text" id="playerNameInput" class="idiom-input" value="${escapeHTML(state.playerName)}" placeholder="Your name" maxlength="30"/></div>
                <button class="idiom-btn idiom-btn-primary idiom-btn-lg idiom-btn-full" id="btnStartSession">🚀 Start Session</button>
                <p class="text-muted" style="font-size:0.78rem; max-width:280px;">Learn 10 expressions, then test your writing.</p>
            </div>`;
        bottomNav.innerHTML = '';

        document.getElementById('btnStartSession').addEventListener('click', () => {
            const inp = document.getElementById('playerNameInput');
            if (inp?.value.trim()) state.playerName = inp.value.trim();
            updateHeaderPlayerName();
            selectSessionProverbs();
            renderLearning();
        });
        document.getElementById('playerNameInput')?.addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('btnStartSession').click();
        });
    }

    // ---------- LEARNING PHASE ----------
    function renderLearning() {
        state.phase = 'learning';
        state.isFlipped = false;
        state.isAnimating = false;
        updateHeaderScore();
        updateHeaderCardIndex();
        startTimer();

        const proverb = state.sessionProverbs[state.currentCardIndex];
        mainContent.innerHTML = `
            <div class="idiom-card-wrapper" id="idiomCardWrapper">
                <div class="idiom-card-stage" id="idiomCardStage">
                    <div class="idiom-card-inner" id="idiomCardInner">
                        <div class="idiom-card-face idiom-card-front" id="idiomCardFront">
                            <div class="idiom-card-bengali">${formatVariantList(proverb.bengali)}</div>
                            <div class="idiom-card-hint">Tap to Reveal English</div>
                        </div>
                        <div class="idiom-card-face idiom-card-back" id="idiomCardBack">
                            <div class="idiom-card-english">${formatVariantList(proverb.english)}</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="swipe-indicator"><span>◀</span> Swipe <span>▶</span></div>
            <div class="nav-buttons">
                <button class="idiom-btn idiom-btn-outline" id="btnPrev" ${state.currentCardIndex === 0 ? 'disabled style="opacity:0.4;"' : ''}>← Previous</button>
                <button class="idiom-btn idiom-btn-outline" id="btnNext">Next →</button>
            </div>`;
        bottomNav.innerHTML = `
            <button class="idiom-btn idiom-btn-danger idiom-btn-full" id="btnFinishSession">🏁 Finish Session</button>
            <button class="idiom-btn idiom-btn-ghost idiom-btn-full" id="btnBackToHubLearning">← Back to Hub</button>`;

        state.cardFrontEl = document.getElementById('idiomCardFront');
        state.cardBackEl = document.getElementById('idiomCardBack');
        state.cardWrapperEl = document.getElementById('idiomCardWrapper');

        attachCardListeners();
        document.getElementById('btnPrev').addEventListener('click', () => navigateCard(-1));
        document.getElementById('btnNext').addEventListener('click', () => navigateCard(1));
        document.getElementById('btnFinishSession').addEventListener('click', finishSessionAndStartQuiz);
        document.getElementById('btnBackToHubLearning').addEventListener('click', () => {
            if (confirm('Leave learning?')) { stopTimer(); renderHub(); }
        });
    }

    function attachCardListeners() {
        const card = document.getElementById('idiomCardStage');
        if (!card) return;
        card.addEventListener('pointerdown', onPointerDown);
        card.addEventListener('pointermove', onPointerMove);
        card.addEventListener('pointerup', onPointerUp);
        card.addEventListener('pointercancel', onPointerCancel);
        card.addEventListener('pointerleave', onPointerCancel);
        card.addEventListener('touchstart', e => { if (e.target.closest('.idiom-card-stage')) e.preventDefault(); }, { passive: false });
    }

    let swipeState = { startX: 0, startY: 0, moved: false, distanceX: 0, swiping: false };
    function onPointerDown(e) { swipeState.startX = e.clientX; swipeState.startY = e.clientY; swipeState.moved = false; swipeState.distanceX = 0; swipeState.swiping = true; e.target.setPointerCapture(e.pointerId); }
    function onPointerMove(e) { if (!swipeState.swiping) return; const dx = e.clientX - swipeState.startX; swipeState.distanceX = dx; if (Math.abs(dx) > 8) swipeState.moved = true; }
    function onPointerUp(e) {
        if (!swipeState.swiping) return;
        swipeState.swiping = false;
        const absDx = Math.abs(swipeState.distanceX), absDy = Math.abs(e.clientY - swipeState.startY);
        if (swipeState.moved && absDx > 50 && absDx > absDy * 1.5) {
            if (swipeState.distanceX < -40) navigateCard(1);
            else if (swipeState.distanceX > 40) navigateCard(-1);
        } else if (!swipeState.moved || (absDx < 15 && absDy < 15)) {
            flipCard();
        }
        swipeState.distanceX = 0; swipeState.moved = false;
        try { e.target.releasePointerCapture(e.pointerId); } catch (ex) {}
    }
    function onPointerCancel(e) { swipeState.swiping = false; try { e.target.releasePointerCapture(e.pointerId); } catch (ex) {} }

    function flipCard() {
        if (state.phase !== 'learning' || state.isAnimating) return;
        const inner = document.getElementById('idiomCardInner');
        if (inner) {
            state.isFlipped = !state.isFlipped;
            inner.classList.toggle('flipped', state.isFlipped);
        }
    }

    function navigateCard(direction) {
        if (state.phase !== 'learning' || state.isAnimating) return;
        const newIndex = state.currentCardIndex + direction;
        if (newIndex < 0) return;
        if (newIndex >= state.totalInSession) { finishSessionAndStartQuiz(); return; }

        state.isAnimating = true;
        const cardStage = document.getElementById('idiomCardStage');
        if (!cardStage) { state.isAnimating = false; return; }

        const exitTranslate = direction > 0 ? '-120%' : '120%';
        const enterTranslate = direction > 0 ? '120%' : '-120%';

        cardStage.style.transition = 'transform 0.3s ease';
        cardStage.style.transform = `translateX(${exitTranslate})`;

        let animating = true;
        const finishAnimation = () => {
            if (!animating) return;
            animating = false;
            state.currentCardIndex = newIndex;
            updateHeaderCardIndex();
            updateCardContent();
            cardStage.style.transition = 'none';
            cardStage.style.transform = `translateX(${enterTranslate})`;
            cardStage.offsetHeight;
            cardStage.style.transition = 'transform 0.3s ease';
            cardStage.style.transform = 'translateX(0)';
            const unlock = () => { state.isAnimating = false; };
            cardStage.addEventListener('transitionend', unlock, { once: true });
            setTimeout(unlock, 350);
        };
        cardStage.addEventListener('transitionend', finishAnimation, { once: true });
        setTimeout(finishAnimation, 350);
    }

    function updateCardContent() {
        const proverb = state.sessionProverbs[state.currentCardIndex];
        if (state.cardFrontEl) {
            const bengaliEl = state.cardFrontEl.querySelector('.idiom-card-bengali');
            if (bengaliEl) bengaliEl.innerHTML = formatVariantList(proverb.bengali);
        }
        if (state.cardBackEl) {
            const englishEl = state.cardBackEl.querySelector('.idiom-card-english');
            if (englishEl) englishEl.innerHTML = formatVariantList(proverb.english);
        }
        const cardInner = document.getElementById('idiomCardInner');
        if (cardInner) cardInner.classList.remove('flipped');
        state.isFlipped = false;
        const prevBtn = document.getElementById('btnPrev'), nextBtn = document.getElementById('btnNext');
        if (prevBtn) {
            if (state.currentCardIndex === 0) { prevBtn.disabled = true; prevBtn.style.opacity = '0.4'; }
            else { prevBtn.disabled = false; prevBtn.style.opacity = '1'; }
        }
        if (nextBtn) nextBtn.textContent = state.currentCardIndex >= state.totalInSession - 1 ? 'Finish →' : 'Next →';
    }

    function finishSessionAndStartQuiz() {
        if (state.phase !== 'learning') return;
        state.quizOrder = [...Array(state.totalInSession).keys()];
        for (let i = state.quizOrder.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [state.quizOrder[i], state.quizOrder[j]] = [state.quizOrder[j], state.quizOrder[i]];
        }
        state.currentQuizIndex = 0;
        state.score = 0;
        state.phase = 'quiz';
        updateHeaderScore();
        updateHeaderCardIndex();
        startTimer();
        renderQuizQuestion();
    }

    // ---------- QUIZ PHASE ----------
    function renderQuizQuestion() {
        if (state.currentQuizIndex >= state.totalInSession) { finishQuiz(); return; }
        state.phase = 'quiz';
        updateHeaderScore();
        updateHeaderCardIndex();

        const sessionIdx = state.quizOrder[state.currentQuizIndex];
        const proverb = state.sessionProverbs[sessionIdx];

        mainContent.innerHTML = `
            <div class="idiom-quiz-card">
                <div class="idiom-quiz-bengali">${escapeHTML(proverb.quizQuestion)}</div>
            </div>
            <div class="idiom-text-input-area">
                <input type="text" id="quizTextInput" class="idiom-input" placeholder="Type the English expression…" autocomplete="off" />
                <button class="idiom-btn idiom-btn-primary idiom-btn-full" id="btnSubmitAnswer">Submit</button>
            </div>`;
        bottomNav.innerHTML = `<button class="idiom-btn idiom-btn-ghost idiom-btn-full" id="btnBackToHubQuiz">← Back to Hub</button>`;

        document.getElementById('quizTextInput').focus();
        document.getElementById('btnSubmitAnswer').addEventListener('click', handleQuizSubmit);
        document.getElementById('quizTextInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleQuizSubmit();
        });
        document.getElementById('btnBackToHubQuiz').addEventListener('click', () => {
            if (confirm('Leave quiz?')) { stopTimer(); renderHub(); }
        });
    }


function findBestGroup(userInput, groups) {
  const userWords = userInput.split(/\s+/).filter(w => w.length > 0);
  let bestGroup = groups[0] || [];
  let bestScore = 0;

  for (const group of groups) {
    let groupScore = 0;
    for (const variant of group) {
      const variantWords = variant.split(/\s+/);
      const overlap = userWords.filter(w => variantWords.includes(w)).length;
      groupScore += overlap;
    }
    if (groupScore > bestScore) {
      bestScore = groupScore;
      bestGroup = group;
    }
  }
  return bestGroup;
}

    
function handleQuizSubmit() {
  const inputField = document.getElementById('quizTextInput');
  if (!inputField) return;
  const rawAnswer = inputField.value;
  if (rawAnswer.trim() === '') return;

  document.getElementById('btnSubmitAnswer').disabled = true;
  inputField.disabled = true;

  const proverb = state.sessionProverbs[state.quizOrder[state.currentQuizIndex]];

  // Normalisation helper
  const normalise = (str) =>
    str.trim().replace(/\.$/, '').replace(/,/g, '').trim().toLowerCase();

  const userAnswer = normalise(rawAnswer);

  // Flatten all groups for checking
  const allExpanded = proverb.quizAnswers.flat();
  const correctAnswers = allExpanded.map(a => normalise(a));

  if (correctAnswers.includes(userAnswer)) {
    // Correct!
    state.score++;
    updateHeaderScore();
    inputField.classList.add('quiz-input-correct');
    setTimeout(() => {
      state.currentQuizIndex++;
      if (state.currentQuizIndex >= state.totalInSession) finishQuiz();
      else renderQuizQuestion();
    }, 700);
  } else {
    // Wrong – find the meaning group closest to the user’s words
    pauseTimer();

    // Ensure groups are always array of arrays (compatibility)
    const groups = Array.isArray(proverb.quizAnswers[0])
      ? proverb.quizAnswers
      : [proverb.quizAnswers];

    const bestGroup = findBestGroup(userAnswer, groups);
    showErrorModal(proverb, bestGroup);
  }
}

function showErrorModal(proverb, groupVariants) {
  modalOverlay.innerHTML = `
    <div class="idiom-modal-panel">
      <div style="font-size:2.5rem; margin-bottom:10px;">❌</div>
      <div class="idiom-modal-label">Correct Answer(s) for this meaning</div>
      <div class="idiom-modal-bengali">${escapeHTML(proverb.quizQuestion)}</div>
      <div class="idiom-modal-correct">→ ${formatVariantList(groupVariants)}</div>
      <button class="idiom-btn idiom-btn-primary idiom-btn-full" id="btnGotIt">👍 Got It</button>
    </div>`;
  modalOverlay.classList.remove('hidden');

  document.getElementById('btnGotIt').addEventListener('click', () => {
    modalOverlay.classList.add('hidden');
    modalOverlay.innerHTML = '';
    resumeTimer();
    state.currentQuizIndex++;
    if (state.currentQuizIndex >= state.totalInSession) finishQuiz();
    else renderQuizQuestion();
  });
}

    function finishQuiz() {
        state.phase = 'results';
        stopTimer();
        updateHeaderScore();
        updateHeaderCardIndex();
        headerCardIndex.textContent = 'Complete';

        const total = state.totalInSession, score = state.score, time = formatTime(state.timerSeconds), perc = Math.round((score / total) * 100);
        let badge = 'badge-bronze', badgeText = '🥉 Keep Practicing', emoji = '📚';
        if (perc >= 90) { badge = 'badge-gold'; badgeText = '🥇 Excellent!'; emoji = '🏆'; }
        else if (perc >= 70) { badge = 'badge-silver'; badgeText = '🥈 Great Job!'; emoji = '🌟'; }

        mainContent.innerHTML = `
            <div class="idiom-results">
                <div style="font-size:3rem;">${emoji}</div>
                <div class="idiom-results-score">${score}<span style="color:var(--text-secondary);">/</span>${total}</div>
                <span class="idiom-results-badge ${badge}">${badgeText}</span>
                <div class="text-muted"><p>⏱️ Time: <strong>${time}</strong></p><p>📊 Accuracy: <strong>${perc}%</strong></p></div>
            </div>`;
        bottomNav.innerHTML = `
            <button class="idiom-btn idiom-btn-primary idiom-btn-full idiom-btn-lg" id="btnNewSession">📚 Learn a few more</button>
            <button class="idiom-btn idiom-btn-ghost idiom-btn-full" id="btnBackToHubResults">← Back to Hub</button>`;

        document.getElementById('btnNewSession').addEventListener('click', () => { selectSessionProverbs(); renderLearning(); });
        document.getElementById('btnBackToHubResults').addEventListener('click', renderHub);
    }

    // ---------- INIT ----------
    async function initApp() {
        updateHeaderPlayerName();
        updateHeaderScore();
        updateHeaderCardIndex();
        headerCardIndex.textContent = `--/${state.totalInSession}`;
        headerScoreItem.classList.add('muted');
        headerScore.textContent = `--/${state.totalInSession}`;
        updateTimerDisplay();

        mainContent.innerHTML = '<div class="idiom-hub"><p style="color:var(--text-secondary);">⏳ Loading data…</p></div>';
        bottomNav.innerHTML = '';

        await loadProverbData();

        if (state.allProverbs.length < CONFIG.cardsPerSession) {
            mainContent.innerHTML = `<div class="idiom-hub"><p style="color:var(--error);">❌ Need at least ${CONFIG.cardsPerSession} entries.</p></div>`;
            return;
        }

        renderHub();
    }

    initApp();
})();
</script>

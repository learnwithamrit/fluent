<!-- Theme colour (browser chrome on mobile) -->

<style>
  body{
    background:#0d0d1a;color:#e8e8f0;
    font-family:'Segoe UI',system-ui,sans-serif;
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;
    text-align:center;
  }
  .logo{font-size:2rem;font-weight:900;color:#ff8906;
    letter-spacing:2px;text-transform:uppercase;}
  .by{font-size:0.85rem;color:#7070a0;font-weight:700;}
  .spin{width:36px;height:36px;border:3px solid #2e2e52;
    border-top-color:#ff8906;border-radius:50%;
    animation:spin .8s linear infinite;margin-top:8px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .msg{font-size:0.72rem;color:#7070a0;}
</style>
</head>
<body>
<div class="logo">Fluent</div>
<div class="by">by Amrit</div>
<div class="spin"></div>
<div class="msg">Loading…</div>
<script>
  // index.html is now the entry point — redirects straight to hub
  // If someone lands here from a bookmark or direct URL, send them to hub
  // Preserve any name param that might have been passed
  const params = new URLSearchParams(window.location.search);
  const name = params.get('name');
  if(name){
    window.location.replace('hub.html?name=' + encodeURIComponent(name));
  } else {
    window.location.replace('hub.html');
  }
</script>
</body>
</html>

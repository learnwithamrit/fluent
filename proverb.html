  <style>
    :root {
      --bg-deep: #121212;
      --card-bg: #1e1e1e;
      --accent: #6366f1;
      --success: #10b981;
      --error: #ef4444;
      --text-primary: #f9fafb;
      --text-secondary: #9ca3af;
      --card-radius: 20px;
      --btn-radius: 14px;
      --transition-speed: 0.3s;
      --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #0a0a0a;
      font-family: var(--font-sans);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
      margin: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
      overflow: hidden;
    }

    /* App container – full screen on mobile, centered card on larger screens */
    .app-container {
      width: 100%;
      height: 100%;
      background: var(--bg-deep);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: none;
      border-radius: 0;
      position: relative;
      transition: all 0.3s ease;
    }

    /* Tablet and larger */
    @media (min-width: 500px) {
      body {
        padding: 16px;
      }
      .app-container {
        max-width: 540px;
        height: auto;
        min-height: 85vh;
        max-height: 95vh;
        border-radius: 32px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.06);
      }
    }

    @media (min-width: 768px) {
      .app-container {
        max-width: 620px;
        min-height: 80vh;
        max-height: 92vh;
        border-radius: 36px;
      }
    }

    @media (min-width: 1024px) {
      body {
        padding: 24px;
      }
      .app-container {
        max-width: 720px;
        min-height: 75vh;
        max-height: 90vh;
        border-radius: 40px;
      }
    }

    /* ============ HEADER ============ */
    .global-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: #1a1a1a;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      gap: 6px;
      flex-shrink: 0;
      flex-wrap: nowrap;
      min-height: 54px;
    }
    .header-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      color: var(--text-secondary);
      white-space: nowrap;
      letter-spacing: 0.01em;
    }
    .header-item .icon {
      font-size: 0.9rem;
      line-height: 1;
    }
    .header-item .value {
      color: var(--text-primary);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      font-family: var(--font-mono);
      font-size: 0.78rem;
    }
    .header-item.score-item {
      transition: opacity 0.4s;
    }
    .header-item.score-item.muted {
      opacity: 0.35;
    }
    .header-divider {
      width: 1px;
      height: 18px;
      background: rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
      border-radius: 1px;
    }

    @media (max-width: 380px) {
      .global-header {
        padding: 8px 10px;
        gap: 4px;
        min-height: 50px;
      }
      .header-item {
        font-size: 0.66rem;
        gap: 3px;
      }
      .header-item .value {
        font-size: 0.7rem;
      }
      .header-item .icon {
        font-size: 0.8rem;
      }
      .header-divider {
        height: 16px;
      }
    }

    @media (min-width: 500px) {
      .global-header {
        padding: 14px 18px;
        gap: 8px;
      }
      .header-item {
        font-size: 0.82rem;
        gap: 6px;
      }
      .header-item .value {
        font-size: 0.85rem;
      }
      .header-item .icon {
        font-size: 1rem;
      }
    }

    /* ============ MAIN CONTENT ============ */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 16px;
      overflow-y: auto;
      gap: 20px;
      position: relative;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
    }

    @media (min-width: 500px) {
      .main-content {
        padding: 24px 20px;
        gap: 24px;
      }
    }

    /* ============ HUB SCREEN ============ */
    .hub-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      width: 100%;
      text-align: center;
    }
    .hub-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .hub-title .accent {
      color: var(--accent);
    }
    .hub-subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 10px;
      font-weight: 500;
    }
    .hub-input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 300px;
    }
    .hub-input-group label {
      color: var(--text-secondary);
      font-size: 0.8rem;
      text-align: left;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .hub-input {
      background: var(--card-bg);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--btn-radius);
      padding: 14px 16px;
      color: var(--text-primary);
      font-size: 1rem;
      font-family: var(--font-sans);
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .hub-input:focus {
      border-color: var(--accent);
    }

    @media (min-width: 500px) {
      .hub-title {
        font-size: 2.2rem;
      }
      .hub-subtitle {
        font-size: 1rem;
      }
      .hub-input-group {
        max-width: 360px;
      }
    }

    /* ============ BUTTONS ============ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      border-radius: var(--btn-radius);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      font-family: var(--font-sans);
      letter-spacing: 0.01em;
      position: relative;
      overflow: hidden;
      white-space: nowrap;
    }
    .btn:active {
      transform: scale(0.96);
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 6px 24px rgba(99, 102, 241, 0.35);
    }
    .btn-primary:hover {
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.5);
      filter: brightness(1.08);
    }
    .btn-outline {
      background: transparent;
      color: var(--text-primary);
      border: 2px solid rgba(255, 255, 255, 0.2);
    }
    .btn-outline:hover {
      border-color: rgba(255, 255, 255, 0.45);
      background: rgba(255, 255, 255, 0.04);
    }
    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      padding: 12px 20px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .btn-ghost:hover {
      color: var(--text-primary);
    }
    .btn-danger-zone {
      background: transparent;
      border: 2px solid var(--error);
      color: var(--error);
      font-weight: 600;
    }
    .btn-danger-zone:hover {
      background: rgba(239, 68, 68, 0.1);
      box-shadow: 0 4px 16px rgba(239, 68, 68, 0.25);
    }
    .btn-full {
      width: 100%;
      max-width: 360px;
    }
    .btn-lg {
      padding: 16px 32px;
      font-size: 1.1rem;
      border-radius: 18px;
    }

    @media (max-width: 380px) {
      .btn {
        padding: 12px 18px;
        font-size: 0.9rem;
      }
    }

    @media (min-width: 500px) {
      .btn {
        padding: 15px 28px;
        font-size: 1rem;
      }
      .btn-lg {
        padding: 18px 36px;
        font-size: 1.2rem;
      }
    }

    /* ============ CARD ============ */
    .card-stage {
      perspective: 1000px;
      width: 100%;
      max-width: 380px;
      aspect-ratio: 1.6 / 1;
      cursor: pointer;
      position: relative;
      transition: transform 0.3s ease;
       will-change: transform;
    }
    .card-wrapper {
  overflow: hidden;
  width: 100%;
  max-width: 380px;   /* same as card-stage max-width */
  position: relative;
}


/* Responsive max-width for wrapper */
@media (max-width: 380px) {
  .card-wrapper { max-width: 320px; }
}
@media (min-width: 500px) {
  .card-wrapper { max-width: 440px; }
}
@media (min-width: 768px) {
  .card-wrapper { max-width: 480px; }
}
    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }
    .card-inner.flipped {
      transform: rotateY(180deg);
    }
    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--card-radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .card-front {
      z-index: 2;
    }
    .card-back {
      transform: rotateY(180deg);
      z-index: 1;
      border-color: rgba(99, 102, 241, 0.3);
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.15);
    }
    .card-bengali {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.5;
      letter-spacing: 0.01em;
    }
    .card-english {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      line-height: 1.5;
    }
    .card-hint {
      font-size: 0.7rem;
      color: var(--text-secondary);
      margin-top: 12px;
      letter-spacing: 0.04em;
      opacity: 0.7;
      text-transform: uppercase;
    }

    @media (max-width: 380px) {
      .card-stage {
        max-width: 320px;
      }
      .card-bengali {
        font-size: 1.1rem;
      }
      .card-english {
        font-size: 0.95rem;
      }
      .card-face {
        padding: 16px;
      }
    }

    @media (min-width: 500px) {
      .card-stage {
        max-width: 440px;
        aspect-ratio: 1.7 / 1;
      }
      .card-bengali {
        font-size: 1.6rem;
      }
      .card-english {
        font-size: 1.3rem;
      }
      .card-hint {
        font-size: 0.8rem;
      }
    }

    @media (min-width: 768px) {
      .card-stage {
        max-width: 480px;
      }
      .card-bengali {
        font-size: 1.8rem;
      }
      .card-english {
        font-size: 1.45rem;
      }
    }

    .swipe-indicator {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--text-secondary);
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      opacity: 0.55;
      pointer-events: none;
      text-transform: uppercase;
    }
    .swipe-indicator span {
      font-size: 1.1rem;
    }
    .nav-buttons {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ============ QUIZ OPTIONS ============ */
    .quiz-question-card {
      background: var(--card-bg);
      border-radius: var(--card-radius);
      padding: 18px 22px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
      width: 100%;
      max-width: 420px;
    }
    .quiz-bengali {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.5;
    }
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 420px;
    }
    .option-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 14px 16px;
      background: var(--card-bg);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--btn-radius);
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      font-family: var(--font-sans);
      letter-spacing: 0.01em;
      min-height: 54px;
    }
    .option-btn .opt-label {
      font-weight: 700;
      color: var(--accent);
      font-size: 0.85rem;
      min-width: 24px;
      text-align: center;
    }

    @media (max-width: 380px) {
      .quiz-bengali {
        font-size: 1.1rem;
      }
      .option-btn {
        padding: 12px 14px;
        font-size: 0.85rem;
        min-height: 50px;
      }
    }

    @media (min-width: 500px) {
      .quiz-bengali {
        font-size: 1.5rem;
      }
      .option-btn {
        font-size: 1rem;
        padding: 16px 20px;
        min-height: 58px;
      }
      .options-list {
        gap: 12px;
      }
    }

    .option-btn.correct-flash {
      border-color: var(--success) !important;
      background: rgba(16, 185, 129, 0.15) !important;
      box-shadow: 0 0 24px rgba(16, 185, 129, 0.4);
      animation: pulse-success 0.5s ease-out;
    }
    .option-btn.wrong-flash {
      border-color: var(--error) !important;
      background: rgba(239, 68, 68, 0.15) !important;
      animation: shake 0.4s ease;
    }
    @keyframes pulse-success {
      0%, 100% { box-shadow: 0 0 8px rgba(16,185,129,0.3); }
      50% { box-shadow: 0 0 28px rgba(16,185,129,0.7); }
    }
    @keyframes shake {
      0%,100%{transform:translateX(0);}
      20%{transform:translateX(-6px);}
      40%{transform:translateX(6px);}
      60%{transform:translateX(-4px);}
      80%{transform:translateX(4px);}
    }

    /* ============ MODAL ============ */
    .modal-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      animation: fadeIn 0.25s ease;
      border-radius: inherit;
    }
    .modal-panel {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 28px 24px;
      text-align: center;
      max-width: 340px;
      width: 90%;
      border: 1px solid rgba(239, 68, 68, 0.4);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.8);
      animation: slideUp 0.3s ease;
    }
    .modal-icon {
      font-size: 2.8rem;
      margin-bottom: 12px;
    }
    .modal-bengali {
      font-size: 1.1rem;
      color: var(--text-primary);
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .modal-correct {
      font-size: 1rem;
      color: var(--success);
      font-weight: 700;
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .modal-label {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    @media (min-width: 500px) {
      .modal-panel {
        max-width: 400px;
        padding: 32px 28px;
      }
      .modal-bengali {
        font-size: 1.3rem;
      }
      .modal-correct {
        font-size: 1.15rem;
      }
    }

    /* ============ RESULTS SCREEN ============ */
    .results-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
      width: 100%;
      padding: 12px;
    }
    .results-score {
      font-size: 3.2rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.03em;
    }
    .results-score .slash {
      color: var(--text-secondary);
      font-weight: 400;
    }
    .results-detail {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    .results-badge {
      display: inline-block;
      padding: 8px 22px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.02em;
    }
    .badge-gold { background: rgba(251,191,36,0.2); color:#fbbf24; border:1px solid rgba(251,191,36,0.4);}
    .badge-silver { background: rgba(156,163,175,0.2); color:#d1d5db; border:1px solid rgba(156,163,175,0.4);}
    .badge-bronze { background: rgba(180,130,90,0.2); color:#d4a574; border:1px solid rgba(180,130,90,0.4);}

    @media (min-width: 500px) {
      .results-score {
        font-size: 4.2rem;
      }
      .results-detail {
        font-size: 1rem;
      }
    }

    /* ============ BOTTOM NAV ============ */
    #bottomNav {
      padding: 10px 16px calc(12px + var(--safe-bottom));
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      border-top: 1px solid rgba(255,255,255,0.04);
      background: rgba(0,0,0,0.2);
    }

    @media (min-width: 500px) {
      #bottomNav {
        padding: 14px 20px calc(16px + var(--safe-bottom));
      }
    }

    /* Utility */
    .hidden { display: none !important; }
    .text-muted { color: var(--text-secondary); }
    .text-center { text-align: center; }
  </style>
</head>

      <div class="header-item"><span class="icon">⏱️</span><span class="value" id="headerTimer">00:00</span></div>

    <div class="main-content" id="mainContent"></div>

    <div id="bottomNav"></div>

    <div class="modal-overlay hidden" id="modalOverlay"></div>

  <script>
    (function() {
     const CONFIG = {
  cardsPerSession: 10,
  googleSheetCSVUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRG7RMIIi7errGd4H44Q36QRzycfvM783pNP8pE6DI5LsNAjczO8klWjiS8Eh6h1szLJqU2XWMW7XZD/pub?gid=0&single=true&output=csv',

    {

      english: ['Locking the stable door after the horse has bolted'],
      distractors: ['Early to bed, early to rise', 'A stitch in time saves nine', 'Actions speak louder than words']
    },
    {

      english: ['Poverty corrupts character'],

    {

      english: ['All bark and no bite'],

async function loadProverbData() {
  if (CONFIG.googleSheetCSVUrl && CONFIG.googleSheetCSVUrl.trim() !== '') {
    try {
      console.log('📡 Fetching Google Sheet…');
      const res = await fetch(CONFIG.googleSheetCSVUrl);
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
      const csv = await res.text();
      console.log('📄 CSV received, first 150 chars:', csv.substring(0, 150));

      const parsed = parseCSV(csv);
      console.log('🔢 Parsed rows:', parsed.length);

      // Skip header row if present (robust check)
      if (parsed.length > 0) {
        const firstRow = parsed[0];
        // Safely get the first Bengali value, whether object or array
        let firstCell = undefined;
        if (firstRow.bengali) {
          firstCell = firstRow.bengali[0];
        } else if (Array.isArray(firstRow)) {
          firstCell = firstRow[0];
        }
        if (firstCell && firstCell.toLowerCase() === 'bengali') {
          console.log('⚠️ Header row detected, removing.');
          parsed.shift();
          console.log('🔢 Rows after header removal:', parsed.length);
        }
      }

      if (parsed.length >= CONFIG.cardsPerSession) {
        state.allProverbs = parsed;
        state.remainingPool = [...parsed]; 
        console.log(`✅ Loaded ${parsed.length} proverbs from Google Sheets`);
        return;
      } else {
        console.warn(`⚠️ Not enough proverbs (got ${parsed.length}, need ${CONFIG.cardsPerSession}). Falling back.`);
      }
    } catch (e) {
      console.warn('❌ Google Sheet fetch failed:', e.message);
    }
  }

  // Fallback – use built‑in data (object format)
  console.log('🔄 Using fallback data.');
  state.allProverbs = CONFIG.fallbackData.map(item => ({
    bengali: [...item.bengali],
    english: [...item.english],
    distractors: [...item.distractors]
  })); state.remainingPool = [...state.allProverbs]; 
}
function parseCSV(txt) {
  const rows = [];
  const lines = txt.trim().split(/\r?\n/);
  for (const line of lines) {
    if (!line.trim()) continue; // skip blank lines
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && i + 1 < line.length && line[i + 1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    cols.push(cur.trim());

    // Only process rows that have at least 5 columns
    if (cols.length >= 5) {
      const bengali = cols[0].split(';').map(s => s.trim()).filter(Boolean);
      const english = cols[1].split(';').map(s => s.trim()).filter(Boolean);
      rows.push({
        bengali: bengali.length ? bengali : [cols[0]],
        english: english.length ? english : [cols[1]],
        distractors: [cols[2], cols[3], cols[4]]
      });
    }
  }
  return rows;
}


function selectSessionProverbs() {
  // If not enough left, refill the pool
  if (state.remainingPool.length < CONFIG.cardsPerSession) {
    state.remainingPool = [...state.allProverbs];
  }

  // Shuffle the remaining pool
  const shuffled = [...state.remainingPool];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }

  // Take the first 10 and remove them from the pool
  state.sessionProverbs = shuffled.slice(0, CONFIG.cardsPerSession);
  state.remainingPool = shuffled.slice(CONFIG.cardsPerSession);

  // Reset session state
  state.currentCardIndex = 0;
  state.isFlipped = false;
  state.score = 0;
  state.currentQuizIndex = 0;
  state.quizOrder = [];
  state.timerSeconds = 0;
  updateTimerDisplay();
  updateHeaderScore();
  updateHeaderCardIndex();
}

      function attachCardListeners(){
        const card=document.getElementById('cardStage'); if(!card) return;
        card.addEventListener('pointerdown', onPointerDown); card.addEventListener('pointermove', onPointerMove);
        card.addEventListener('pointerup', onPointerUp); card.addEventListener('pointercancel', onPointerCancel);
        card.addEventListener('pointerleave', onPointerCancel);
        card.addEventListener('touchstart',e=>{ if(e.target.closest('.card-stage')) e.preventDefault(); },{passive:false});
      }
      function onPointerDown(e){ state.swipeStartX=e.clientX; state.swipeStartY=e.clientY; state.swipeMoved=false; state.swipeDistanceX=0; state.isSwiping=true; e.target.setPointerCapture(e.pointerId); }
      function onPointerMove(e){ if(!state.isSwiping) return; const dx=e.clientX-state.swipeStartX, dy=e.clientY-state.swipeStartY; state.swipeDistanceX=dx; if(Math.abs(dx)>8||Math.abs(dy)>8) state.swipeMoved=true; }
      function onPointerUp(e){
        if(!state.isSwiping) return; state.isSwiping=false;
        const absDx=Math.abs(state.swipeDistanceX), absDy=Math.abs(e.clientY-state.swipeStartY);
        if(state.swipeMoved && absDx>50 && absDx>absDy*1.5){ if(state.swipeDistanceX<-40) navigateCard(1); else if(state.swipeDistanceX>40) navigateCard(-1); }
        else if(!state.swipeMoved || (absDx<15 && absDy<15)) flipCard();
        state.swipeDistanceX=0; state.swipeMoved=false; try{e.target.releasePointerCapture(e.pointerId);}catch(ex){}
      }
      function onPointerCancel(e){ state.isSwiping=false; state.swipeDistanceX=0; state.swipeMoved=false; try{e.target.releasePointerCapture(e.pointerId);}catch(ex){} }
      function flipCard(){  if (state.phase !== 'learning' || state.isAnimating) return;  const inner=document.getElementById('cardInner'); if(!inner) return; state.isFlipped=!state.isFlipped; inner.classList.toggle('flipped', state.isFlipped); }


function navigateCard(direction) {
  if (state.phase !== 'learning' || state.isAnimating) return;
  const newIndex = state.currentCardIndex + direction;
  if (newIndex < 0) return;
  if (newIndex >= state.totalInSession) {
    finishSessionAndStartQuiz();
    return;
  }

  state.isAnimating = true;
  const cardStage = document.getElementById('cardStage');
  if (!cardStage) {
    state.isAnimating = false;
    return;
  }

  // Determine slide-out direction: next (1) → left, previous (-1) → right
  const exitTranslate = direction > 0 ? '-120%' : '120%';
  const enterTranslate = direction > 0 ? '120%' : '-120%';

  // Slide current card out
  cardStage.style.transition = 'transform 0.3s ease';
  cardStage.style.transform = `translateX(${exitTranslate})`;

  let animating = true;

  const finishAnimation = () => {
    if (!animating) return;
    animating = false;

    // Update the proverb index and header
    state.currentCardIndex = newIndex;
    updateHeaderCardIndex();

    // Update the card content (text)
    updateCardContent();

    // Jump the card to the opposite side instantly
    cardStage.style.transition = 'none';
    cardStage.style.transform = `translateX(${enterTranslate})`;
    cardStage.offsetHeight; // force reflow

    // Animate back to center
    cardStage.style.transition = 'transform 0.3s ease';
    cardStage.style.transform = 'translateX(0)';

    // Unlock after enter animation completes (with timeout fallback)
    const unlock = () => {
      state.isAnimating = false;
    };
    cardStage.addEventListener('transitionend', unlock, { once: true });
    setTimeout(unlock, 350);
  };

  // Wait for exit slide to finish
  cardStage.addEventListener('transitionend', finishAnimation, { once: true });
  setTimeout(finishAnimation, 350); // safety net
}


      

function updateCardContent() {
  const proverb = state.sessionProverbs[state.currentCardIndex];
  
  // Update Bengali side

      function finishSessionAndStartQuiz(){

function renderQuizQuestion() {
  if (state.currentQuizIndex >= state.totalInSession) {
    finishQuiz();
    return;
  }
  state.phase = 'quiz';
  updateHeaderScore();
  updateHeaderCardIndex();

  const sessionIdx = state.quizOrder[state.currentQuizIndex];
  const proverb = state.sessionProverbs[sessionIdx];

  // Pick one random correct English variant to display as the option
  const randomCorrect = proverb.english[Math.floor(Math.random() * proverb.english.length)];

  // Build options: 1 correct (random variant) + 3 distractors
  const options = [
    { text: randomCorrect, isCorrect: true },
    { text: proverb.distractors[0], isCorrect: false },
    { text: proverb.distractors[1], isCorrect: false },
    { text: proverb.distractors[2], isCorrect: false }
  ];

  // Shuffle options
  for (let i = options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [options[i], options[j]] = [options[j], options[i]];
  }

  const labels = ['A', 'B', 'C', 'D'];

  mainContent.innerHTML = `

      <div class="quiz-bengali">${formatVariantList(proverb.bengali)}</div>
    </div>
    <div class="options-list" id="optionsList">
      ${options.map((opt, i) => `
        <button class="option-btn" data-index="${i}" data-correct="${opt.isCorrect}">
          <span class="opt-label">(${labels[i]})</span>
          <span>${escapeHTML(opt.text)}</span>
        </button>
      `).join('')}
    </div>
  `;

  bottomNav.innerHTML = `

  `;

  document.querySelectorAll('.option-btn').forEach(b => {
    b.addEventListener('click', function() { handleQuizAnswer(this); });
  });

  document.getElementById('btnBackToHubQuiz').addEventListener('click', () => {
    if (confirm('Leave quiz?')) { stopTimer(); renderHub(); }
  });
}


      
function handleQuizAnswer(btn) {
  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.style.pointerEvents = 'none');

  // Get the visible text of the clicked button
  const selectedText = btn.querySelector('span:last-child').textContent.trim();

  // Get the current proverb's English array
  const proverb = state.sessionProverbs[state.quizOrder[state.currentQuizIndex]];

  // Check if selected text matches any of the correct English variants
  const isCorrect = proverb.english.includes(selectedText);

  if (isCorrect) {
    btn.classList.add('correct-flash');
    state.score++;
    updateHeaderScore();
    setTimeout(() => {
      state.currentQuizIndex++;
      if (state.currentQuizIndex >= state.totalInSession) {
        finishQuiz();
      } else {
        renderQuizQuestion();
      }
    }, 600);
  } else {
    btn.classList.add('wrong-flash');
    pauseTimer();
    showErrorModal();
  }
}

      async function initApp(){
        updateHeaderPlayerName(); updateHeaderScore(); updateHeaderCardIndex();
        headerCardIndex.textContent=`--/${state.totalInSession}`; headerScoreItem.classList.add('muted'); headerScore.textContent=`--/${state.totalInSession}`; updateTimerDisplay();
        mainContent.innerHTML='<div class="hub-screen"><p style="color:var(--text-secondary);">⏳ Loading proverbs...</p></div>'; bottomNav.innerHTML='';
        await loadProverbData();
        if(state.allProverbs.length<CONFIG.cardsPerSession){ mainContent.innerHTML=`<div class="hub-screen"><p style="color:var(--error);">❌ Need at least ${CONFIG.cardsPerSession} proverbs.</p></div>`; return; }
        renderHub();
      }
      initApp();
    })();
  </script>
</body>
</html>
